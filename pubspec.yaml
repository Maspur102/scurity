name: scurity
description: "A Smart Home Security Control Application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  # Package MQTT Client resmi untuk komunikasi dengan ESP32
  mqtt_client: ^10.3.0 
  audioplayers: ^5.2.1
  file_picker: ^8.0.0
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  # INI BAGIAN YANG DIPERBAIKI
  uses-material-design: true